name: Android Release APK

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore Android signing key
        env:
          HIKARI_DEBUG_KEYSTORE_BASE64: ${{ secrets.HIKARI_DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.android"
          echo "$HIKARI_DEBUG_KEYSTORE_BASE64" | base64 --decode > "$HOME/.android/debug.keystore"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Run Android tests
        working-directory: android
        run: ./gradlew test

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Prepare APK artifact
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/release/app-release.apk "release-artifacts/hikari-${GITHUB_REF_NAME}.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikari-apk
          path: release-artifacts/*.apk

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" release-artifacts/*.apk --clobber

      - name: Create GitHub Release with APK
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-artifacts/*.apk \
            --title "Android MVP ${GITHUB_REF_NAME} - Daily Light + Smart Saved Collections" \
            --notes "Adds Daily Light Tagesbriefing, Smart Saved Collections, and feed score metadata for high-learning saved groups."
