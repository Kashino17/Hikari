name: Android Release APK

on:
  # Fires when a release is created (manually via `gh release create` or
  # via the GitHub UI). The job rebuilds the APK in a clean CI environment
  # and uploads it to the release with --clobber, overwriting whatever APK
  # was attached at release-creation time.
  #
  # We deliberately do NOT fire on push:tags. That path used to also try
  # `gh release create`, which collides ("a release with the same tag name
  # already exists") whenever the release was created manually first —
  # producing a failure notification on every release.
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore Android signing key
        env:
          HIKARI_DEBUG_KEYSTORE_BASE64: ${{ secrets.HIKARI_DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.android"
          echo "$HIKARI_DEBUG_KEYSTORE_BASE64" | base64 --decode > "$HOME/.android/debug.keystore"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Run Android tests
        working-directory: android
        run: ./gradlew test

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Prepare APK artifact
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/release/app-release.apk "release-artifacts/hikari-${GITHUB_REF_NAME}.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikari-apk
          path: release-artifacts/*.apk

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" release-artifacts/*.apk --clobber
