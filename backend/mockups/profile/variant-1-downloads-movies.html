<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<base href="/mockups/profile/">
<link rel="stylesheet" href="_dl-styles.css">
<title>Hikari · Downloads · Filme</title>
</head>
<body>
<div class="frame">
  <div class="topbar">
    <a href="variant-1.html" class="iconpill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      <span class="lbl">Downloads</span>
    </a>
    <div class="title">FILME</div>
    <a href="#" class="iconpill" aria-label="Bearbeiten">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </a>
  </div>

  <div class="hero">
    <div class="h">Filme</div>
    <div class="m">2 Filme<span class="sep">·</span>3.8 GB</div>
  </div>

  <div class="filters">
    <div class="fp active">Alle <span class="n">2</span></div>
    <div class="fp">Anime <span class="n">2</span></div>
    <div class="fp">2024</div>
    <div class="fp">Klassiker</div>
  </div>

  <div class="toolrow">
    <div class="left"><span class="v">Sortieren:</span> Zuletzt geladen</div>
    <div class="actions">
      <div class="b"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M6 12h12M10 18h4"/></svg>Filter</div>
    </div>
  </div>

  <div class="moviegrid">
    <div class="movie-card">
      <div class="bg" style="background:linear-gradient(135deg,#831843,#f472b6)"></div>
      <div class="gradient"></div>
      <div class="size">↓ 1.8 GB</div>
      <div class="body">
        <div class="nm">Spirited Away</div>
        <div class="meta">125 min · 1080p</div>
      </div>
    </div>
    <div class="movie-card">
      <div class="bg" style="background:linear-gradient(135deg,#0f172a,#1e293b)"></div>
      <div class="gradient"></div>
      <div class="size">↓ 2.0 GB</div>
      <div class="body">
        <div class="nm">Princess Mononoke</div>
        <div class="meta">134 min · 1080p</div>
      </div>
    </div>
  </div>

  <div class="bottomspace"></div>
</div>

<div class="variantnav">
  <div class="row">
    <a class="cur" href="variant-1.html">V1</a>
    <a href="variant-2.html">V2</a>
    <a href="variant-3.html">V3</a>
    <a href="index.html">Index</a>
  </div>
</div>

<script>
document.querySelectorAll('.fp').forEach(p=>p.addEventListener('click',()=>{document.querySelectorAll('.fp').forEach(x=>x.classList.remove('active'));p.classList.add('active');}));
</script>
</body>
</html>
